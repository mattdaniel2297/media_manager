{% extends "base.html" %}
{% block content %}
<h1>Import Media</h1>

{% if error %}
<div class="error-box">{{ error }}</div>
{% endif %}

<form method="POST" action="/import" id="import-form">
    <div class="card">
        <h2>Paths</h2>
        <label for="src">Source directory</label>
        <input type="text" id="src" name="src" placeholder="/mnt/phone/DCIM" autocomplete="off">
        <label for="dest">Destination (library) directory</label>
        <input type="text" id="dest" name="dest" placeholder="/home/you/Photos" autocomplete="off">
        <p class="hint">Paths are remembered in your browser for next time.</p>
    </div>

    <div class="card">
        <h2>Options</h2>
        <div class="checkbox-group">
            <label class="checkbox-row">
                <input type="checkbox" name="copyright" id="copyright">
                <span>Write copyright metadata<small>EXIF + IPTC tags</small></span>
            </label>
            <label class="checkbox-row">
                <input type="checkbox" name="watermark" id="watermark">
                <span>Apply watermark<small>© text, lower-right corner</small></span>
            </label>
            <label class="checkbox-row">
                <input type="checkbox" name="remove" id="remove">
                <span>Remove from source<small>Move instead of copy</small></span>
            </label>
            <label class="checkbox-row">
                <input type="checkbox" name="catalog" id="catalog">
                <span>Create catalog<small>Create catalog.db if absent</small></span>
            </label>
            <label class="checkbox-row">
                <input type="checkbox" name="norename" id="norename">
                <span>Keep original filenames<small>Skip UUID rename</small></span>
            </label>
        </div>
    </div>

    <div class="actions">
        <button type="submit">Run Import</button>
    </div>
</form>

<script>
    const KEYS = {
        src: 'mm_import_src',
        dest: 'mm_import_dest',
        copyright: 'mm_import_copyright',
        watermark: 'mm_import_watermark',
        remove: 'mm_import_remove',
        catalog: 'mm_import_catalog',
        norename: 'mm_import_norename',
    };

    // Restore saved values
    document.getElementById('src').value = localStorage.getItem(KEYS.src) || '';
    document.getElementById('dest').value = localStorage.getItem(KEYS.dest) || '';
    ['copyright', 'watermark', 'remove', 'catalog', 'norename'].forEach(id => {
        const saved = localStorage.getItem(KEYS[id]);
        if (saved !== null) document.getElementById(id).checked = saved === 'true';
    });

    // Save on submit
    document.getElementById('import-form').addEventListener('submit', () => {
        localStorage.setItem(KEYS.src, document.getElementById('src').value);
        localStorage.setItem(KEYS.dest, document.getElementById('dest').value);
        ['copyright', 'watermark', 'remove', 'catalog', 'norename'].forEach(id => {
            localStorage.setItem(KEYS[id], document.getElementById(id).checked);
        });
    });
</script>
{% endblock %}
